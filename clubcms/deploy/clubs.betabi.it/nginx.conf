# Nginx vhost per clubs.betabi.it — aaPanel
#
# Posizione file da copiare sul server:
#   /www/server/panel/vhost/nginx/clubs.betabi.it.conf
#
# SSL: gestito da aaPanel (Let's Encrypt via pannello).
#   I percorsi certificati sotto sono quelli standard di aaPanel.
#   Se hai un certificato custom, adatta ssl_certificate / ssl_certificate_key.
#
# Dopo la copia riavvia nginx: bt nginx restart  (oppure dal pannello aaPanel)

upstream clubs_cms {
    server 127.0.0.1:8001;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name clubs.betabi.it www.clubs.betabi.it;

    # Let's Encrypt ACME challenge (gestito da aaPanel)
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/clubs.betabi.it;
    }

    location / {
        return 301 https://clubs.betabi.it$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name clubs.betabi.it www.clubs.betabi.it;

    # Redirect www → apex
    if ($host = www.clubs.betabi.it) {
        return 301 https://clubs.betabi.it$request_uri;
    }

    # SSL — certificati Let's Encrypt gestiti da aaPanel
    ssl_certificate     /www/server/panel/vhost/cert/clubs.betabi.it/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/clubs.betabi.it/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:clubs_ssl:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 20M;
    root /www/wwwroot/clubs.betabi.it;

    # File statici Django (collectstatic → /www/wwwroot/clubs.betabi.it/staticfiles/)
    location /static/ {
        alias /www/wwwroot/clubs.betabi.it/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # File media caricati dagli utenti
    location /media/ {
        alias /www/wwwroot/clubs.betabi.it/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check (no log)
    location /health/ {
        proxy_pass http://clubs_cms;
        access_log off;
    }

    # Applicazione Django — gunicorn su 127.0.0.1:8001
    location / {
        proxy_pass         http://clubs_cms;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_redirect     off;
        proxy_read_timeout 120s;
    }

    # Log separati per questo vhost
    access_log  /www/wwwlogs/clubs.betabi.it.log;
    error_log   /www/wwwlogs/clubs.betabi.it.error.log;
}
