<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#2d1810"/>
  <!-- Tower of Pisa (simplified) -->
  <rect x="82" y="50" width="36" height="90" rx="2" fill="#d4a574" stroke="#f0d9b5" stroke-width="1.5"/>
  <!-- Floors -->
  <line x1="82" y1="65" x2="118" y2="65" stroke="#b8956a" stroke-width="1"/>
  <line x1="82" y1="78" x2="118" y2="78" stroke="#b8956a" stroke-width="1"/>
  <line x1="82" y1="91" x2="118" y2="91" stroke="#b8956a" stroke-width="1"/>
  <line x1="82" y1="104" x2="118" y2="104" stroke="#b8956a" stroke-width="1"/>
  <line x1="82" y1="117" x2="118" y2="117" stroke="#b8956a" stroke-width="1"/>
  <line x1="82" y1="130" x2="118" y2="130" stroke="#b8956a" stroke-width="1"/>
  <!-- Columns per floor -->
  <line x1="90" y1="50" x2="90" y2="140" stroke="#b8956a" stroke-width="0.8"/>
  <line x1="100" y1="50" x2="100" y2="140" stroke="#b8956a" stroke-width="0.8"/>
  <line x1="110" y1="50" x2="110" y2="140" stroke="#b8956a" stroke-width="0.8"/>
  <!-- Dome -->
  <ellipse cx="100" cy="50" rx="12" ry="8" fill="#d4a574" stroke="#f0d9b5" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="76" y="140" width="48" height="8" rx="1" fill="#d4a574" stroke="#f0d9b5" stroke-width="1.5"/>
  <!-- Slight lean via transform -->
  <g transform="rotate(-3, 100, 140)" opacity="0.15">
    <rect x="82" y="50" width="36" height="90" fill="none" stroke="#f0d9b5" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" fill="#e8b828" font-family="sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em">TERRE DI PISA</text>
  <text x="100" y="186" text-anchor="middle" fill="#a08060" font-family="sans-serif" font-size="8" letter-spacing="0.15em">MOTO CLUB</text>
</svg>
