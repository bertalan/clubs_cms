    <circle cx="8" cy="18" r="7" fill="none" stroke="#e8b828" stroke-width="2"/>
    <circle cx="42" cy="18" r="7" fill="none" stroke="#e8b828" stroke-width="2"/>
  </g>
  <!-- Text -->
  <text x="100" y="168" text-anchor="middle" fill="#e8b828" font-family="sans-serif" font-size="11" font-weight="700" letter-spacing="0.1em">LAGO DI GARDA</text>
  <text x="100" y="184" text-anchor="middle" fill="#5a8aaa" font-family="sans-serif" font-size="8" letter-spacing="0.15em">MOTO CLUB</text>
