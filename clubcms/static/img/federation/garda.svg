<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0a2540"/>
  <!-- Lake waves -->
  <path d="M0 115 Q25 105 50 115 T100 115 T150 115 T200 115 V145 H0 Z" fill="#1a6b8a" opacity="0.6"/>
  <path d="M0 122 Q25 112 50 122 T100 122 T150 122 T200 122 V145 H0 Z" fill="#1a6b8a" opacity="0.4"/>
  <path d="M0 130 Q25 120 50 130 T100 130 T150 130 T200 130 V145 H0 Z" fill="#1a6b8a" opacity="0.25"/>
  <!-- Mountains -->
  <polygon points="20,115 60,65 100,115" fill="#1a3a5c"/>
  <polygon points="70,115 120,50 170,115" fill="#1a4a6c"/>
  <polygon points="130,115 165,75 200,115" fill="#1a3a5c"/>
