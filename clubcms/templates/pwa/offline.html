{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'it' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% trans "Offline" %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        .offline-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .offline-page__icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        .offline-page__title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .offline-page__text {
            color: var(--color-text-muted, #666);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <main class="offline-page">
        <div class="offline-page__icon" aria-hidden="true">&#9888;</div>
        <h1 class="offline-page__title">{% trans "You are offline" %}</h1>
        <p class="offline-page__text">{% trans "Check your internet connection and try again." %}</p>
        <button class="btn btn--primary" onclick="location.reload()">{% trans "Retry" %}</button>
    </main>
</body>
</html>
