{% load wagtailcore_tags i18n %}

<section class="block-timeline">
    <div class="container">
        {% if self.title %}
        <h2 class="block-timeline__title">{{ self.title }}</h2>
        {% endif %}
        <div class="block-timeline__list">
            {% for item in self.items %}
            <div class="block-timeline__item">
                <span class="block-timeline__year">{{ item.year }}</span>
                <div class="block-timeline__divider" aria-hidden="true"></div>
                <div class="block-timeline__content">
                    <h3 class="block-timeline__item-title">{{ item.title }}</h3>
                    {% if item.description %}
                    <p class="block-timeline__description">{{ item.description }}</p>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
